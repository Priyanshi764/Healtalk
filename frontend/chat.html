<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealTalk Chat</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:#0d1321;color:#edf2ff;font-family:'Segoe UI',sans-serif;}
  .layout{display:grid;grid-template-columns:320px 1fr;min-height:100vh;}
  .sidebar{background:#111827;padding:24px;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:18px;}
  .sidebar h2{font-size:22px;color:#00b5ff;}
  .btn{border:none;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;background:linear-gradient(90deg,#00b5ff,#3b82f6);color:#fff;}
  .btn-secondary{background:rgba(255,255,255,.08);color:#dbeafe;}
  .user-list{display:grid;gap:10px;overflow-y:auto;padding-right:4px;}
  .user-card{padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.04);cursor:pointer;border:1px solid transparent;transition:all .2s;}
  .user-card.active, .user-card:hover{border-color:#00b5ff;background:rgba(0,181,255,.12);}
  .user-card strong{display:block;margin-bottom:6px;font-size:15px;}
  .user-card small{color:#a5b4fc;}
  .search-box,input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff;outline:none;}
  .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .header h2{font-size:20px;}
  .chat-panel{display:flex;flex-direction:column;gap:12px;}
  .messages{flex:1;overflow-y:auto;padding:20px;background:linear-gradient(180deg,rgba(13,19,33,.9),rgba(13,19,33,1));border-radius:24px;border:1px solid rgba(255,255,255,.08);}
  .message{max-width:75%;margin-bottom:12px;padding:12px 16px;border-radius:18px;line-height:1.5;position:relative;}
  .message.self{margin-left:auto;background:linear-gradient(90deg,#22c55e,#10b981);color:#fff;}
  .message.other{margin-right:auto;background:rgba(255,255,255,.08);color:#e2e8f0;}
  .message small{display:block;margin-top:8px;color:rgba(255,255,255,.65);font-size:12px;}
  .typing{font-size:13px;color:#93c5fd;}
  .composer{display:flex;gap:10px;align-items:center;padding-top:10px;}
  .composer input{flex:1;}
  .footer{display:flex;gap:10px;align-items:center;justify-content:space-between;}
  .meta{font-size:13px;color:#94a3b8;}
  .mobile-hide{display:none;}
  @media(max-width:900px){.layout{grid-template-columns:1fr;} .sidebar{position:fixed;z-index:10;width:100%;max-height:360px;overflow:auto;border-right:none;border-bottom:1px solid rgba(255,255,255,.08);} .chat-panel{margin-top:380px;} }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="header"><div><h2>HealTalk</h2><small>Peer chat</small></div><div><button class="btn btn-secondary" onclick="location.href='dashboard.html'">Dashboard</button><button class="btn btn-secondary" onclick="logout()">Logout</button></div></div>
    <input class="search-box" type="text" id="userSearch" placeholder="Search people..." oninput="searchPeople()">
    <div class="user-list" id="peopleList"></div>
  </aside>
  <main class="chat-panel">
    <div class="header">
      <div><h2 id="chatTitle">Select a chat</h2><small id="chatSubtitle">Choose a conversation from the left</small></div>
      <div class="meta" id="statusText">Connecting...</div>
    </div>
    <div class="messages" id="messageList"></div>
    <div class="typing" id="typingIndicator" style="display:none;">Typing...</div>
    <div class="composer">
      <input type="text" id="messageInput" placeholder="Type a message" oninput="onTyping()" onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="btn" onclick="sendMessage()">Send</button>
    </div>
  </main>
</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const API='http://localhost:5000/api';
const token=localStorage.getItem('token');
let me=null; let currentChat=null; let socket=null; let typingTimer=null;
if(!token) location.href='index.html';
const headers={Authorization:'Bearer '+token,'Content-Type':'application/json'};
const messageList=document.getElementById('messageList');
const peopleList=document.getElementById('peopleList');
const chatTitle=document.getElementById('chatTitle');
const chatSubtitle=document.getElementById('chatSubtitle');
const statusText=document.getElementById('statusText');
const typingIndicator=document.getElementById('typingIndicator');
const messageInput=document.getElementById('messageInput');
async function init(){
  try{ const res=await fetch(API+'/users/me',{headers}); if(!res.ok) throw new Error(); me=await res.json(); localStorage.setItem('user',JSON.stringify(me)); }
  catch{logout();}
  socket=io('http://localhost:5000');
  socket.on('connect',()=>{statusText.textContent='Online'; if(me) socket.emit('user-online',me._id);});
  socket.on('receive-message',data=>{ if(data.senderId===currentChat?._id){appendMessage(data.message,false,data.senderName);} else {showToast('New message from '+data.senderName);} loadInbox(); });
  socket.on('typing',data=>{ if(currentChat && data.senderId===currentChat._id){typingIndicator.style.display='block';}});
  socket.on('stop-typing',data=>{ if(currentChat && data.senderId===currentChat._id){typingIndicator.style.display='none';}});
  socket.on('disconnect',()=>{statusText.textContent='Disconnected';});
  await loadInbox();
  await loadPeople();
}
function logout(){localStorage.removeItem('token');localStorage.removeItem('user');location.href='login.htm';}
async function loadInbox(){ try{ const res=await fetch(API+'/chat/inbox/list',{headers}); if(!res.ok) throw new Error(); const inbox=await res.json(); peopleList.innerHTML=''; inbox.forEach(chat=>{ const partner=chat.senderId._id===me._id?chat.receiverId:chat.senderId; const card=document.createElement('div'); card.className='user-card'+(currentChat && currentChat._id===partner._id?' active':''); card.innerHTML=`<strong>${partner.name}</strong><small>@${partner.username}</small>`; card.onclick=()=>selectChat(partner); peopleList.appendChild(card); }); } catch(e){console.error(e);} }
async function loadPeople(query=''){ try{ const url=API+'/users/search/query?q='+encodeURIComponent(query); const res=await fetch(url,{headers}); if(!res.ok) return; const users=await res.json(); peopleList.innerHTML=''; users.filter(u=>u._id!==me._id).forEach(u=>{ const card=document.createElement('div'); card.className='user-card'; card.innerHTML=`<strong>${u.name}</strong><small>@${u.username} · ${u.disease||'No condition'}</small>`; card.onclick=()=>selectChat(u); peopleList.appendChild(card); }); } catch(e){console.error(e);} }
function searchPeople(){ const q=document.getElementById('userSearch').value.trim(); if(q.length<2){loadInbox();return;} loadPeople(q); }
async function selectChat(user){ currentChat=user; chatTitle.textContent=user.name; chatSubtitle.textContent='@'+user.username; document.querySelectorAll('.user-card').forEach(el=>el.classList.toggle('active',el.textContent.includes(user.name))); await loadMessages(user._id); }
async function loadMessages(receiverId){ try{ const res=await fetch(API+'/chat/'+receiverId,{headers}); if(!res.ok) throw new Error(); const chats=await res.json(); messageList.innerHTML=''; chats.forEach(c=>appendMessage(c.message,c.senderId===me._id,c.senderId!==me._id?c.senderId===receiverId?currentChat.name:'':me.name)); messageList.scrollTop=messageList.scrollHeight; } catch(e){console.error(e);} }
function appendMessage(text,self,author){ const msg=document.createElement('div'); msg.className='message '+(self?'self':'other'); msg.innerHTML=`<div>${text}</div><small>${self?'You':author}</small>`; messageList.appendChild(msg); messageList.scrollTop=messageList.scrollHeight; }
async function sendMessage(){ const text=messageInput.value.trim(); if(!text||!currentChat) return; messageInput.value=''; appendMessage(text,true,'You'); try{ await fetch(API+'/chat/send',{method:'POST',headers,body:JSON.stringify({receiverId:currentChat._id,message:text})}); socket.emit('send-message',{receiverId:currentChat._id,senderId:me._id,senderName:me.name,message:text}); if(currentChat) selectChat(currentChat); } catch(e){console.error(e);} }
function onTyping(){ if(!currentChat) return; socket.emit('typing',{receiverId:currentChat._id,senderId:me._id}); clearTimeout(typingTimer); typingTimer=setTimeout(()=>{ if(socket) socket.emit('stop-typing',{receiverId:currentChat._id,senderId:me._id}); },800); }
function showToast(msg){ const toast=document.createElement('div'); toast.textContent=msg; Object.assign(toast.style,{position:'fixed',bottom:'24px',right:'24px',padding:'12px 18px',background:'#0f172a',color:'#fff',borderRadius:'14px',boxShadow:'0 12px 28px rgba(0,0,0,.3)',zIndex:'999'}); document.body.appendChild(toast); setTimeout(()=>toast.remove(),3200); }
init();
</script>
</body>
</html>
