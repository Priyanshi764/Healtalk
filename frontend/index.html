<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealTalk – Health Social Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* Intro */
  #intro {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 999; transition: opacity 0.8s;
  }
  .intro-logo {
    font-size: 72px; font-weight: 900; color: #fff;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: pulse 1.5s ease-in-out;
  }
  @keyframes pulse {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Glass card */
  .glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px 36px;
    width: 380px;
    color: #fff;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

  h2 { text-align: center; margin-bottom: 24px; font-size: 22px; }
  .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    .glass {
      width: 90%;
      max-width: 100%;
      padding: 32px 24px;
      border-radius: 20px;
    }
    h2 { font-size: 20px; margin-bottom: 16px; }
    .subtitle { font-size: 12px; margin-bottom: 16px; }
    input, select {
      padding: 11px 14px;
      font-size: 16px;
      margin: 6px 0;
    }
    .btn {
      padding: 12px;
      font-size: 14px;
      margin-top: 12px;
    }
    .toggle { font-size: 12px; margin-top: 12px; }
    .error, .success { font-size: 12px; margin-top: 6px; }
    .intro-logo { font-size: 48px; }
  }

  @media (max-width: 480px) {
    .glass {
      width: 95%;
      padding: 24px 16px;
      border-radius: 16px;
    }
    h2 { font-size: 18px; margin-bottom: 12px; }
    .subtitle { font-size: 11px; margin-bottom: 12px; }
    input, select {
      padding: 10px 12px;
      font-size: 16px;
      margin: 5px 0;
    }
    .btn {
      padding: 11px;
      font-size: 13px;
      margin-top: 10px;
    }
    .intro-logo { font-size: 36px; }
  }

  input, select {
    width: 100%; padding: 12px 16px; margin: 8px 0;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: #fff; font-size: 14px; outline: none;
    transition: border 0.3s;
  }
  input::placeholder { color: rgba(255,255,255,0.4); }
  input:focus, select:focus { border-color: #00c6ff; }
  select option { background: #302b63; }

  .btn {
    width: 100%; padding: 13px; margin-top: 14px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    border: none; border-radius: 12px; color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,114,255,0.4); }

  .toggle { text-align: center; margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.6); }
  .toggle a { color: #00c6ff; cursor: pointer; text-decoration: none; }

  .error { color: #ff6b6b; font-size: 13px; text-align: center; margin-top: 8px; display: none; }
  .success { color: #51cf66; font-size: 13px; text-align: center; margin-top: 8px; display: none; }

  /* Floating particles */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute; width: 4px; height: 4px;
    background: rgba(0,198,255,0.4); border-radius: 50%;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
</style>
</head>
<body>

<div id="intro"><div class="intro-logo">💚 HealTalk</div></div>

<div class="particles" id="particles"></div>

<div class="glass" id="authCard" style="display:none; position:relative; z-index:1;">

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Sign in to your HealTalk account</p>
    <input type="email" id="loginEmail" placeholder="Email address">
    <input type="password" id="loginPassword" placeholder="Password">
    <div class="error" id="loginError"></div>
    <button class="btn" onclick="login()">Sign In</button>
    <div class="toggle">Don't have an account? <a onclick="showRegister()">Register</a></div>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none;">
    <h2>Join HealTalk 💚</h2>
    <p class="subtitle">Connect with people who understand you</p>
    <input type="text" id="regName" placeholder="Full Name">
    <input type="text" id="regUsername" placeholder="Username">
    <input type="email" id="regEmail" placeholder="Email address">
    <input type="password" id="regPassword" placeholder="Password">
    <input type="text" id="regDisease" placeholder="Your condition (e.g. Diabetes, Anxiety)">
    <div class="error" id="regError"></div>
    <div class="success" id="regSuccess"></div>
    <button class="btn" onclick="register()">Create Account</button>
    <div class="toggle">Already have an account? <a onclick="showLogin()">Sign In</a></div>
  </div>

</div>

<script>
const API = "https://healtalk-4.onrender.com/api";

// Particles
const pc = document.getElementById("particles");
for (let i = 0; i < 30; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (6 + Math.random() * 10) + "s";
  p.style.animationDelay = (Math.random() * 8) + "s";
  p.style.width = p.style.height = (2 + Math.random() * 4) + "px";
  pc.appendChild(p);
}

// Intro
setTimeout(() => {
  document.getElementById("intro").style.opacity = "0";
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("authCard").style.display = "block";
  }, 800);
}, 2000);

// Check if already logged in
if (localStorage.getItem("token")) window.location.href = "dashboard.html";

function showRegister() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registerForm").style.display = "block";
}
function showLogin() {
  document.getElementById("registerForm").style.display = "none";
  document.getElementById("loginForm").style.display = "block";
}

async function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errEl = document.getElementById("loginError");
  errEl.style.display = "none";

  if (!email || !password) { errEl.textContent = "Please fill all fields"; errEl.style.display = "block"; return; }

  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.style.display = "block"; return; }
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location.href = "dashboard.html";
  } catch {
    errEl.textContent = "Server error. Make sure backend is running.";
    errEl.style.display = "block";
  }
}

async function register() {
  const name = document.getElementById("regName").value.trim();
  const username = document.getElementById("regUsername").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPassword").value;
  const disease = document.getElementById("regDisease").value.trim();
  const errEl = document.getElementById("regError");
  const sucEl = document.getElementById("regSuccess");
  errEl.style.display = "none"; sucEl.style.display = "none";

  if (!name || !username || !email || !password) {
    errEl.textContent = "Please fill all required fields"; errEl.style.display = "block"; return;
  }

  try {
    const res = await fetch(API + "/auth/register", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, username, email, password, disease })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.style.display = "block"; return; }
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));
    sucEl.textContent = "Account created! Redirecting...";
    sucEl.style.display = "block";
    setTimeout(() => window.location.href = "dashboard.html", 1200);
  } catch {
    errEl.textContent = "Server error. Make sure backend is running.";
    errEl.style.display = "block";
  }
}
</script>
</body>
</html>
